[phases.install]
cmds = ["cd backend/mob-api && composer install --no-dev --optimize-autoloader --no-scripts"]

[start]
cmd = "cd backend/mob-api && php artisan package:discover --ansi && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
