name: mob_app
description: "Mob - Real-time city discovery app for Lagos"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.7

  # Network
  dio: ^5.7.0

  # Functional Programming
  dartz: ^0.10.1

  # Location
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Maps
  google_maps_flutter: ^2.9.0

  # Media
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  flutter_image_compress: ^2.3.0
  video_player: ^2.9.2
  video_compress: ^3.1.3

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # Storage
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # UI
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
  lottie: ^3.1.2

  # Utils
  intl: ^0.19.0
  mime: ^2.0.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  permission_handler: ^11.3.1
  webview_flutter: ^4.9.0
  # connectivity_plus: ^6.0.5  # TEMP: disabled due to iOS 15.5 compatibility issue

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/splash/
